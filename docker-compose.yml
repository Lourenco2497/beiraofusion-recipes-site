services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: beirao_fusion
    volumes:
      - ./beiraofusion-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 12

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      MYSQLHOST: db
      MYSQLUSER: root
      MYSQLPASSWORD: rootpassword
      MYSQLDATABASE: beirao_fusion
      MYSQLPORT: 3306
      PORT: 80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./imgs:/var/www/html/imgs
    command: sh -c "php setup/seed.php && php -S 0.0.0.0:80"

volumes:
  db_data: